<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Max Station · 我的工作台</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛰️</text></svg>">
<link rel="stylesheet" href="css/app.css">
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="logo">🛰️ <span>Max Station</span></div>
    <nav id="nav"></nav>
    <div class="sidebar-foot">
      <button id="btn-export" class="ghost-btn" title="把所有数据下载成一个 JSON 文件">⬇️ 备份数据</button>
      <button id="btn-import" class="ghost-btn" title="从 JSON 备份文件恢复数据">⬆️ 恢复备份</button>
      <input type="file" id="import-file" accept="application/json,.json" hidden>
      <div id="visit-stat" class="visit-stat">👀 访问 <span id="visit-count">–</span> 次</div>
    </div>
  </aside>
  <main id="main"></main>
</div>
<div id="toast-wrap"></div>

<!-- 骨架层 -->
<script src="js/app.js"></script>
<script src="js/store.js"></script>
<!-- 功能模块(注册顺序 = 侧边栏顺序) -->
<script src="js/modules/dashboard.js"></script>
<script src="js/modules/kanban.js"></script>
<script src="js/modules/calendar.js"></script>
<script src="js/modules/notes.js"></script>
<script src="js/modules/pomodoro.js"></script>
<script src="js/modules/games.js"></script>
<!-- 游戏(通过 App.registerGame 挂进游戏厅) -->
<script src="js/games/game-2048.js"></script>
<script src="js/games/snake.js"></script>
<script src="js/games/minesweeper.js"></script>
<script src="js/games/memory.js"></script>
<script>document.addEventListener('DOMContentLoaded', () => App.init());</script>
<script>
// 访客统计:GoatCounter,和 max 主页共用同一个后台 maxdev.goatcounter.com
// 只在线上统计;本地预览不计数也不显示
if (location.hostname.endsWith('github.io')) {
  const s = document.createElement('script');
  s.async = true;
  s.dataset.goatcounter = 'https://maxdev.goatcounter.com/count';
  s.src = 'https://gc.zgo.at/count.js';
  document.head.appendChild(s);
  // 侧边栏的可见计数(需要 GoatCounter 设置里开启 visitor counter;没开就安静隐藏)
  fetch('https://maxdev.goatcounter.com/counter//max-station/.json')
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(d => { document.getElementById('visit-count').textContent = String(d.count).trim(); })
    .catch(() => { document.getElementById('visit-stat').style.display = 'none'; });
} else {
  document.getElementById('visit-stat').style.display = 'none';
}
</script>
<script>
// Microsoft Clarity 行为回放：仅线上注入，本地预览不收集
if (location.hostname.endsWith('github.io')) {
  (function(c,l,a,r,i,t,y){c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
  t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
  y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);})(window,document,"clarity","script","x653yfhj1g");
}
</script>
</body>
</html>
